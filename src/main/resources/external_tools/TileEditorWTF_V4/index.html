<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Tile Map Editor</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Share+Tech+Mono&family=Exo+2:wght@300;400;600&display=swap" rel="stylesheet" />
  <link rel="stylesheet" href="styles.css" />
</head>
<body>

  <div id="app">

    <!-- TOP BAR -->
    <header id="topbar">
      <div id="topbar-brand">
        <span class="brand-icon">&#9632;</span>
        <span class="brand-name">TILEMAP EDITOR V3.1</span>
      </div>
      <form id="map-config-form" autocomplete="off">
        <label>Map Name
          <input type="text" id="cfg-name" value="Untitled Map" maxlength="40" />
        </label>
        <label>Width (tiles)
          <input type="number" id="cfg-width" value="20" min="4" max="200" />
        </label>
        <label>Height (tiles)
          <input type="number" id="cfg-height" value="15" min="4" max="200" />
        </label>
        <label>Tile Size (px)
          <input type="number" id="cfg-tilesize" value="32" min="8" max="128" step="8" />
        </label>
        <button type="submit" id="btn-apply">Apply</button>
        <button type="button" id="btn-export">Export JSON</button>
        <button type="button" id="btn-clear">Clear</button>
      </form>
      <div id="topbar-hint">TAB / SPACE — toggle tile palette</div>
    </header>

    <!-- MAIN LAYOUT -->
    <div id="workspace">

      <!-- TOOLS SIDEBAR -->
      <aside id="tools-panel">

        <!-- TABS -->
        <div class="panel-tabs">
          <button class="tab-btn active" data-tab="draw">Draw</button>
          <button class="tab-btn" data-tab="collision">Collision</button>
        </div>

        <!-- DRAW TAB -->
        <div class="tab-content active" id="tab-draw">
          <p class="panel-section-label">Tools</p>
          <div id="tool-buttons">
            <button class="tool-btn active" data-tool="brush" title="Brush (B)">
              <svg viewBox="0 0 20 20"><path d="M3 17c2-1 4-3 5-5l7-7a2 2 0 00-3-3L5 9c-2 1-3 3-3 5l1 3z"/></svg>
              <span>Brush</span>
            </button>
            <button class="tool-btn" data-tool="eraser" title="Eraser (E)">
              <svg viewBox="0 0 20 20"><rect x="2" y="9" width="16" height="8" rx="1"/><line x1="7" y1="9" x2="4" y2="17" stroke-width="1"/></svg>
              <span>Eraser</span>
            </button>
            <button class="tool-btn" data-tool="fill" title="Fill / Bucket (F)">
              <svg viewBox="0 0 20 20"><path d="M4 14l7-11 5 5-11 7z"/><circle cx="15" cy="15" r="3"/></svg>
              <span>Fill</span>
            </button>
            <button class="tool-btn" data-tool="select" title="Select (S)">
              <svg viewBox="0 0 20 20"><rect x="3" y="3" width="14" height="14" fill="none" stroke-dasharray="3 2" stroke-width="1.5"/><circle cx="3" cy="3" r="1.5"/><circle cx="17" cy="3" r="1.5"/><circle cx="3" cy="17" r="1.5"/><circle cx="17" cy="17" r="1.5"/></svg>
              <span>Select</span>
            </button>
            <button class="tool-btn" data-tool="eyedropper" title="Eyedropper (I)">
              <svg viewBox="0 0 20 20"><path d="M10 2L3 9l7 7 7-7-7-7z"/><circle cx="10" cy="10" r="2"/></svg>
              <span>Eyedropper</span>
            </button>
          </div>

          <p class="panel-section-label" style="margin-top:16px;">Active Tile</p>
          <div id="active-tile-preview">
            <canvas id="active-tile-canvas" width="48" height="48"></canvas>
            <span id="active-tile-label">None</span>
          </div>
        </div>

        <!-- COLLISION TAB -->
        <div class="tab-content" id="tab-collision">
          <p class="panel-section-label">Collision Tools</p>
          <div id="collision-tool-buttons">
            <button class="collision-tool-btn active" data-collision-tool="brush" title="Paint collision (C)">
              <svg viewBox="0 0 20 20"><path d="M3 17c2-1 4-3 5-5l7-7a2 2 0 00-3-3L5 9c-2 1-3 3-3 5l1 3z"/></svg>
              <span>Paint</span>
            </button>
            <button class="collision-tool-btn" data-collision-tool="eraser" title="Erase collision (X)">
              <svg viewBox="0 0 20 20"><rect x="2" y="9" width="16" height="8" rx="1"/><line x1="7" y1="9" x2="4" y2="17" stroke-width="1"/></svg>
              <span>Erase</span>
            </button>
            <button class="collision-tool-btn" data-collision-tool="fill" title="Fill collision (G)">
              <svg viewBox="0 0 20 20"><path d="M4 14l7-11 5 5-11 7z"/><circle cx="15" cy="15" r="3"/></svg>
              <span>Fill</span>
            </button>
          </div>

          <p class="panel-section-label" style="margin-top:12px;">Collision Type</p>
          <div id="collision-types">
            <button class="collision-btn active" data-collision="NONE">
              <span class="col-swatch" style="background:transparent;border:1px solid #555;"></span> None
            </button>
            <button class="collision-btn" data-collision="WALK">
              <span class="col-swatch" style="background:#4caf50aa;"></span> Walk
            </button>
            <button class="collision-btn" data-collision="BLOCK">
              <span class="col-swatch" style="background:#f44336aa;"></span> Block
            </button>
            <button class="collision-btn" data-collision="SURF">
              <span class="col-swatch" style="background:#2196f3aa;"></span> Surf
            </button>
          </div>

          <p class="panel-section-label" style="margin-top:16px;">Legend</p>
          <div class="collision-legend">
            <div><span class="col-swatch" style="background:#4caf5088;"></span> WALK — passable</div>
            <div><span class="col-swatch" style="background:#f4433688;"></span> BLOCK — solid</div>
            <div><span class="col-swatch" style="background:#2196f388;"></span> SURF — water</div>
          </div>
        </div>

        <!-- LAYERS — always visible below the tabs -->
        <div id="layers-panel">
          <p class="panel-section-label">Layers</p>
          <div id="layer-list">
            <div class="layer-item active" data-layer="0">
              <span class="layer-eye">👁</span>
              <span class="layer-name">Layer 1</span>
            </div>
            <div class="layer-item" data-layer="1">
              <span class="layer-eye">👁</span>
              <span class="layer-name">Layer 2</span>
            </div>
            <div class="layer-item" data-layer="2">
              <span class="layer-eye">👁</span>
              <span class="layer-name">Layer 3</span>
            </div>
          </div>
          <button class="small-btn" id="btn-add-layer">+ Layer</button>
        </div>

      </aside>

      <!-- CANVAS AREA -->
      <main id="canvas-area">
        <div id="canvas-container">
          <canvas id="map-canvas"></canvas>
          <div id="canvas-coords"></div>
        </div>
      </main>

    </div>
  </div>

  <!-- TILE PALETTE -->
  <div id="tile-palette" class="palette-hidden">
    <div id="palette-header">
      <span>Tile Palette</span>
      <span id="palette-close-hint">TAB / SPACE to close</span>
    </div>
    <div id="palette-search-row">
      <input type="text" id="palette-search" placeholder="Search tiles..." />
    </div>
    <div id="palette-tree"></div>
  </div>
  <div id="palette-backdrop"></div>

  <script src="app.js"></script>
</body>
</html>
